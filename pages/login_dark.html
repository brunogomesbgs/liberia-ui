<form class="space-y-6" onsubmit="return false;">
<div class="group">
<label class="block font-label-md text-[12px] tracking-widest text-outline mb-1 group-focus-within:text-primary transition-colors" for="email">EMAIL ADDRESS</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary transition-all py-2 font-body-md text-body-md text-on-surface placeholder:text-outline/50" id="email" name="email" placeholder="scholar@alexandria.edu" type="email"/>
</div>
<div class="group">
<label class="block font-label-md text-[12px] tracking-widest text-outline mb-1 group-focus-within:text-primary transition-colors" for="password">PASSWORD</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary transition-all py-2 font-body-md text-body-md text-on-surface placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary text-on-primary py-4 rounded-lg font-label-md text-label-md hover:bg-primary-container hover:text-on-primary-container transition-all active:scale-[0.98] duration-100 flex justify-center items-center gap-2">
<span id="submit-text">Sign In</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>

<script>
        function switchMode(mode) {
            const loginTab = document.getElementById('login-tab');
            const signupTab = document.getElementById('signup-tab');
            const formTitle = document.getElementById('form-title');
            const formSubtitle = document.getElementById('form-subtitle');
            const submitText = document.getElementById('submit-text');

            if (mode === 'login') {
                loginTab.classList.add('text-primary', 'border-primary');
                loginTab.classList.remove('text-on-surface-variant');
                signupTab.classList.remove('text-primary', 'border-primary');
                signupTab.classList.add('text-on-surface-variant');
                
                formTitle.innerText = 'Welcome Back';
                formSubtitle.innerText = 'Enter your credentials to continue your dialogue.';
                submitText.innerText = 'Sign In';
            } else {
                signupTab.classList.add('text-primary', 'border-primary');
                signupTab.classList.remove('text-on-surface-variant');
                loginTab.classList.remove('text-primary', 'border-primary');
                loginTab.classList.add('text-on-surface-variant');

                formTitle.innerText = 'Begin Your Journey';
                formSubtitle.innerText = 'Join our scholarly community and start the conversation.';
                submitText.innerText = 'Create Account';
            }
        }

        // Simple Fade-in micro-interaction
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.auth-card-shadow');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.8s ease-out';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
