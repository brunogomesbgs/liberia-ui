<body class="bg-background text-on-surface font-body-md selection:bg-primary/30 custom-scrollbar">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim border-b border-on-surface/10 flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 w-full z-50 docked full-width top-0 fixed">
<div class="flex items-center gap-4">
<button class="hover:bg-on-surface/5 transition-colors active:scale-95 duration-100 p-2 rounded-full">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">arrow_back</span>
</button>
<h1 class="font-title-md text-title-md text-primary dark:text-primary-fixed">Edit Profile</h1>
</div>
<div class="hidden md:flex gap-6">
<span class="font-label-md text-label-md text-on-surface-variant cursor-pointer hover:text-primary transition-colors">Chat</span>
<span class="font-label-md text-label-md text-on-surface-variant cursor-pointer hover:text-primary transition-colors">History</span>
<span class="font-label-md text-label-md text-primary font-bold">Profile</span>
</div>
</header>
<main class="pt-24 pb-32 max-w-container-max mx-auto px-margin-mobile md:px-0">
<!-- Profile Picture Section -->
<section class="flex flex-col items-center mb-12">
<div class="relative group cursor-pointer">
<div class="w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-2 border-outline-variant bg-surface-container-high">
<img alt="Profile" class="w-full h-full object-cover grayscale brightness-75 transition-all duration-500 group-hover:grayscale-0 group-hover:scale-110" data-alt="A high-contrast cinematic portrait of a scholarly man in a dark turtleneck, lit with dramatic Rembrandt lighting against a charcoal background. The aesthetic is moody and intellectual, matching a premium midnight library theme with golden undertones. Fine detail and sharp focus evoke a sense of professional literary authority." src="https://lh3.googleusercontent.com/aida-public/AB6AXuALxWzkvRVyawrlCmEdDojOYFbfTLUjqfpbGg5xiXNv_OVUe8zCrqIyDtgABAU7hc1Q6Di41jddEbbha08AWkGNztFCocYKBoYBCuCIBxCWHXrJIZUX02h0sV6qH_RN2VXC8hIdCakejAgBky8PEho9RU3WVPSwatQPNTBX_K7E0hZr1G8xTwNAC3mZ6q0ps32IQARmuqWxQg6OtLVESaO9txVOFt9OIHtDK7P9-jl0V00WLSCG7gyNWtwJ3IDXGCZab2eDFiYJEWlE"/>
</div>
<div class="absolute inset-0 flex flex-col items-center justify-center rounded-full bg-surface/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<span class="material-symbols-outlined text-primary text-3xl">photo_camera</span>
<span class="font-label-md text-[10px] uppercase tracking-widest text-primary mt-1">Change</span>
</div>
</div>
<p class="mt-4 font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Profile Identity</p>
</section>
<!-- Form Fields -->
<form class="space-y-10">
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Full Name -->
<div class="relative">
<label class="block font-label-md text-label-md text-primary mb-2 uppercase tracking-tighter">Full Name</label>
<input class="w-full bg-surface-container border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body-md py-3 transition-colors placeholder-on-surface-variant/30" placeholder="Enter your name" type="text" value="Julian Thorne"/>
</div>
<!-- Email -->
<div class="relative">
<label class="block font-label-md text-label-md text-primary mb-2 uppercase tracking-tighter">Email Address</label>
<input class="w-full bg-surface-container border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body-md py-3 transition-colors placeholder-on-surface-variant/30" placeholder="email@example.com" type="email" value="thorne.j@nocturnal-ink.edu"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Phone -->
<div class="relative">
<label class="block font-label-md text-label-md text-primary mb-2 uppercase tracking-tighter">Phone Number</label>
<input class="w-full bg-surface-container border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body-md py-3 transition-colors placeholder-on-surface-variant/30" placeholder="+1 (000) 000-0000" type="tel" value="+1 (212) 555-0198"/>
</div>
<!-- Locale -->
<div class="relative">
<label class="block font-label-md text-label-md text-primary mb-2 uppercase tracking-tighter">Locale</label>
<select class="w-full bg-surface-container border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body-md py-3 transition-colors">
<option selected="">English (United Kingdom)</option>
<option>English (United States)</option>
<option>French (Paris)</option>
<option>German (Berlin)</option>
</select>
</div>
</div>
<!-- Bio -->
<div class="relative">
<label class="block font-label-md text-label-md text-primary mb-2 uppercase tracking-tighter">Bio</label>
<textarea class="w-full bg-surface-container border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body-md py-3 transition-colors resize-none placeholder-on-surface-variant/30" placeholder="Tell us about your literary journey..." rows="4">Exploring the intersection of Victorian gothic literature and modern digital existentialism. Always searching for the perfect semicolon.</textarea>
</div>
<!-- Timezone -->
<div class="relative">
<label class="block font-label-md text-label-md text-primary mb-2 uppercase tracking-tighter">Timezone</label>
<select class="w-full bg-surface-container border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface font-body-md py-3 transition-colors">
<option selected="">Greenwich Mean Time (GMT+0)</option>
<option>Eastern Standard Time (GMT-5)</option>
<option>Pacific Standard Time (GMT-8)</option>
<option>Central European Time (GMT+1)</option>
</select>
</div>
<!-- Submit -->
<div class="pt-8 flex flex-col md:flex-row items-center justify-between gap-6">
<p class="text-on-surface-variant font-label-md text-xs italic">Last updated: Oct 24, 2023</p>
<button class="w-full md:w-auto px-10 py-4 bg-primary text-on-primary font-label-md font-bold uppercase tracking-widest rounded-lg hover:bg-primary-container transition-all active:scale-95 duration-150 shadow-lg shadow-primary/10" type="submit">
                    Save Changes
                </button>
</div>
</form>
<!-- Scholarly Quote Decor -->
<div class="mt-24 border-l-2 border-primary pl-6 py-2 italic opacity-40">
<p class="font-body-md text-on-surface">"To write is to discover what you believe, but to edit is to decide what you will stand by."</p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 bg-surface dark:bg-surface-dim px-margin-mobile border-t border-on-surface/10">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-on-surface/5 transition-colors active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="font-label-md text-label-md mt-1">Chat</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant hover:bg-on-surface/5 transition-colors active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-label-md text-label-md mt-1">History</span>
</a>
<a class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed font-bold active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-md text-label-md mt-1">Profile</span>
</a>
</nav>
<script>
        // Simple micro-interaction for input focus
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.letterSpacing = '0.15em';
                input.parentElement.querySelector('label').style.transition = 'all 0.3s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.letterSpacing = '-0.025em';
            });
        });

        // Form submission prevent default for demo
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'Updating...';
            btn.classList.add('opacity-70');
            
            setTimeout(() => {
                btn.innerText = 'Profile Updated';
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-tertiary-container', 'text-on-tertiary-container');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('bg-tertiary-container', 'text-on-tertiary-container', 'opacity-70');
                    btn.classList.add('bg-primary');
                }, 2000);
            }, 1000);
        });
    </script>
</body></html>
